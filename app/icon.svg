<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <style>
      .grid-line {
        fill: none;
        stroke: #E21A22;
        stroke-width: 3.2;
        stroke-linecap: round;
      }
      .grid-node {
        fill: #FFFFFF;
        stroke: #E21A22;
        stroke-width: 3.2;
      }
    </style>
  </defs>

  <!-- Smooth, organically curved grid lines -->
  <path class="grid-line" d="M 12,38 Q 35,33 60,35 T 108,38" />
  <path class="grid-line" d="M 12,61 Q 35,63 60,61 T 108,59" />
  <path class="grid-line" d="M 12,84 Q 35,83 60,87 T 108,84" />

  <path class="grid-line" d="M 38,12 Q 33,35 35,60 T 38,108" />
  <path class="grid-line" d="M 61,12 Q 63,35 61,60 T 59,108" />
  <path class="grid-line" d="M 84,12 Q 83,35 87,60 T 84,108" />

  <!-- Intersection Nodes -->
  <circle class="grid-node" cx="35" cy="35" r="6" />
  <circle class="grid-node" cx="61" cy="35" r="6" />
  <circle class="grid-node" cx="85" cy="36" r="6" />
  
  <circle class="grid-node" cx="34" cy="62" r="6" />
  <circle class="grid-node" cx="61" cy="61" r="6" />
  <circle class="grid-node" cx="88" cy="60" r="6" />
  
  <circle class="grid-node" cx="36" cy="86" r="6" />
  <circle class="grid-node" cx="62" cy="86" r="6" />
  <circle class="grid-node" cx="86" cy="85" r="6" />
</svg>
